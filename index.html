<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mockup Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0d0d10;--panel:#111116;--line:rgba(255,255,255,.07);--t0:rgba(255,255,255,.95);--t1:rgba(255,255,255,.72);--t2:rgba(255,255,255,.42);--hi:rgba(255,255,255,.07);--hi2:rgba(255,255,255,.12);--r:5px;--f:'DM Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);overflow:hidden}
    #canvas{display:block;width:100%;height:100%;touch-action:none}
    #panel{position:absolute;top:14px;left:14px;z-index:20;width:232px;max-height:calc(100vh - 28px);overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px;display:flex;flex-direction:column;gap:8px;font-family:var(--f);scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
    #panel::-webkit-scrollbar{width:3px}#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
    .hdr{display:flex;align-items:center;justify-content:space-between}.hdr-title{font-size:11.5px;color:var(--t0);letter-spacing:-.01em}
    #status{font-size:10px;color:var(--t2);transition:color .3s}#status.ok{color:rgba(80,210,130,.75)}#status.err{color:rgba(210,90,90,.75)}
    .sep{height:1px;background:var(--line);flex-shrink:0}
    .lbl{font-size:9.5px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase}
    .seg{display:flex;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}.seg button{flex:1;height:27px;background:none;border:none;border-right:1px solid var(--line);color:var(--t2);font:10px var(--f);cursor:pointer;transition:background .1s,color .1s}.seg button:last-child{border-right:none}.seg button:hover{background:var(--hi);color:var(--t1)}.seg button.on{background:var(--hi2);color:var(--t0)}
    .dz{position:relative;height:40px;border:1px dashed var(--line);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t2);cursor:pointer;transition:all .15s;overflow:hidden}.dz:hover,.dz.over{border-color:rgba(255,255,255,.22);color:var(--t1);background:var(--hi)}.dz input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;height:100%}
    #bgColorWrap{display:none}#bgColorPick{width:100%;height:28px;border:1px solid var(--line);border-radius:var(--r);background:var(--hi);padding:3px;cursor:pointer}
    button{font:10px var(--f);cursor:pointer;border-radius:var(--r);border:1px solid var(--line);background:var(--hi);color:var(--t1);transition:background .1s,color .1s}button:hover{background:var(--hi2);color:var(--t0)}
    .btn-primary{width:100%;height:32px;background:rgba(255,255,255,.88);color:#0d0d10;border-color:transparent;font-size:11px}.btn-primary:hover{background:#fff;color:#000}
    .rot-wrap{display:flex;align-items:center;gap:8px}.rot-wrap input[type="range"]{flex:1;-webkit-appearance:none;height:2px;background:var(--line);border-radius:1px;outline:none;cursor:pointer}.rot-wrap input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.75);box-shadow:0 0 0 3px rgba(255,255,255,.12);transition:background .1s}.rot-wrap input[type="range"]::-webkit-slider-thumb:hover{background:#fff}#rotVal{font-size:10px;color:var(--t2);min-width:32px;text-align:right;flex-shrink:0}
    .size-row{display:flex;align-items:center;gap:4px}.size-row input{flex:1;min-width:0;height:27px;background:var(--hi);border:1px solid var(--line);border-radius:var(--r);color:var(--t0);font:10.5px var(--f);text-align:center;outline:none;-moz-appearance:textfield}.size-row input::-webkit-inner-spin-button,.size-row input::-webkit-outer-spin-button{-webkit-appearance:none}.size-row input:focus{border-color:rgba(255,255,255,.18)}.x-sep{font-size:10px;color:var(--t2);flex-shrink:0}
    #toasts{position:fixed;bottom:14px;right:14px;z-index:100;display:flex;flex-direction:column-reverse;gap:4px;pointer-events:none}.toast{padding:7px 11px;border-radius:6px;background:rgba(11,11,15,.97);border:1px solid var(--line);font:10.5px var(--f);color:var(--t1);backdrop-filter:blur(12px);animation:tin .18s ease;transition:opacity .25s}.toast.ok{border-color:rgba(80,200,130,.2);color:rgba(90,210,140,.9)}.toast.err{border-color:rgba(210,80,80,.2);color:rgba(210,110,110,.9)}@keyframes tin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .dev-row{display:flex;gap:5px}.dev-btn{flex:1;height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:var(--r);border:1px solid var(--line);background:var(--hi);color:var(--t2);cursor:pointer;transition:all .15s;font-size:9px;font-family:var(--f)}.dev-btn svg{width:16px;height:16px}.dev-btn:hover{background:var(--hi2);color:var(--t1)}.dev-btn.active{background:var(--hi2);border-color:rgba(255,255,255,.22);color:var(--t0)}
    #orbitBtn{position:fixed;top:14px;right:14px;z-index:30;width:34px;height:34px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--t2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}#orbitBtn:hover{color:var(--t1);border-color:rgba(255,255,255,.15)}#orbitBtn.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:var(--t0)}body.orbit-mode #canvas{cursor:grab}body.orbit-mode #canvas:active{cursor:grabbing}
    .hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font:10px var(--f);color:var(--t2);pointer-events:none;white-space:nowrap}
    #iconDropZone{position:relative;height:48px;border:1px dashed var(--line);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t2);cursor:pointer;transition:all .15s;overflow:hidden;flex-direction:column;gap:2px}#iconDropZone:hover,#iconDropZone.over{border-color:rgba(255,255,255,.22);color:var(--t1);background:var(--hi)}#iconDropZone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;height:100%}#iconDropZone .dz-sub{font-size:9px;color:var(--t2);opacity:.6}
    #iconList{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}#iconList:empty::after{content:'No icons yet';grid-column:1/-1;font-size:9.5px;color:var(--t2);text-align:center;padding:10px 0}
    .icon-item{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);cursor:pointer;transition:border-color .15s,transform .1s;aspect-ratio:1;background:var(--hi)}.icon-item:hover{border-color:rgba(255,255,255,.2);transform:scale(1.03)}.icon-item.active{border-color:rgba(255,255,255,.55);box-shadow:0 0 0 1px rgba(255,255,255,.25)}.icon-item img{width:100%;height:100%;object-fit:cover;display:block}.icon-del{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);color:var(--t1);font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;pointer-events:none;line-height:1}.icon-item:hover .icon-del{opacity:1;pointer-events:auto}.icon-del:hover{background:rgba(210,60,60,.8);border-color:rgba(210,60,60,.4)}.icon-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:6px 3px 3px;font-size:7.5px;color:var(--t1);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0;transition:opacity .15s}.icon-item:hover .icon-name{opacity:1}.icon-item.active::after{content:'';position:absolute;top:3px;left:3px;width:6px;height:6px;border-radius:50%;background:rgba(90,210,140,.9);box-shadow:0 0 4px rgba(90,210,140,.6)}
    #hsPanel{position:fixed;top:14px;right:58px;z-index:25;width:220px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;display:none;flex-direction:column}#hsPanel.visible{display:flex}#hsPanelHeader{padding:7px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);font:9.5px var(--f);color:var(--t2);letter-spacing:.08em;text-transform:uppercase;cursor:move}#hsPanelClose{width:16px;height:16px;border-radius:3px;background:var(--hi);border:1px solid var(--line);color:var(--t2);font-size:10px;display:flex;align-items:center;justify-content:center}#hsPanelClose:hover{background:rgba(210,60,60,.4);color:var(--t0)}#hsPanelBody{padding:8px}
    .iphone-homescreen{background:linear-gradient(160deg,#1a2d5a 0%,#0d0d20 60%,#2d1a4a 100%);border-radius:14px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.1);font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif}.hs-time{text-align:center;color:rgba(255,255,255,.9);font-size:11px;font-weight:300;letter-spacing:.02em;margin-bottom:6px}.hs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.hs-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}.hs-icon{width:36px;height:36px;border-radius:9px;overflow:hidden;background:rgba(255,255,255,.1)}.hs-icon img{width:100%;height:100%;object-fit:cover;display:block}.hs-icon-lbl{font-size:7px;color:rgba(255,255,255,.75);text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.8);max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.hs-dock{margin-top:6px;background:rgba(255,255,255,.08);border-radius:10px;padding:5px;display:flex;justify-content:center;gap:5px}.hs-dock .hs-icon{width:32px;height:32px;border-radius:8px}.hs-icon-empty{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.12)}
    #hsToggleBtn{position:fixed;top:14px;right:58px;z-index:30;height:34px;padding:0 10px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--t2);font:9.5px var(--f);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}#hsToggleBtn:hover{color:var(--t1);border-color:rgba(255,255,255,.15)}#hsToggleBtn.active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:var(--t0)}#hsToggleBtn svg{width:14px;height:14px}
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="panel">
  <div class="hdr"><span class="hdr-title">3D Mockup Studio</span><span id="status">Loading…</span></div>
  <div class="sep"></div>
  <div class="dev-row" id="devRow">
    <button class="dev-btn active" data-dev="iphone" title="iPhone"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="1" width="10" height="18" rx="2.5"/><line x1="9" y1="16.5" x2="11" y2="16.5"/></svg>iPhone</button>
    <button class="dev-btn" data-dev="watch" title="Apple Watch"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="5.5" width="9" height="9" rx="2.5"/><path d="M7.5 5.5V3.5h5v2M7.5 14.5v2h5v-2"/></svg>Watch</button>
    <button class="dev-btn" data-dev="macbook" title="MacBook Pro"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="16" height="11" rx="1.5"/><path d="M1 15.5h18"/><path d="M7.5 15.5L8 17h4l.5-1.5"/></svg>MacBook</button>
  </div>
  <div class="sep"></div>
  <span class="lbl">Background</span>
  <div class="seg"><button class="on" id="bgTransBtn">Transparent</button><button id="bgSolidBtn">Color</button></div>
  <div id="bgColorWrap"><input type="color" id="bgColorPick" value="#0b0b0f" /></div>
  <div class="sep"></div>
  <span class="lbl">Screen</span>
  <div class="dz" id="screenDZ"><input type="file" id="screenInput" accept="image/png,image/jpeg,image/webp" /><span>↓ Drop image · PNG / JPG / WebP</span></div>
  <div class="seg" id="fitSeg"><button class="on" data-v="cover">Cover</button><button data-v="contain">Contain</button><button data-v="stretch">Stretch</button></div>
  <div class="rot-wrap"><input type="range" id="rotSlider" min="-270" max="270" step="1" value="0" /><span id="rotVal">0°</span></div>
  <div class="sep"></div>
  <div class="hdr" style="align-items:center;"><span class="lbl" style="margin:0;">App Icons</span><span id="iconCount" style="font-size:9px;color:var(--t2);">0 icons</span></div>
  <div id="iconDropZone"><input type="file" id="iconFileInput" accept="image/png,image/jpeg,image/webp" multiple /><span>↓ Drop icon · any image</span><span class="dz-sub">Auto-resized to 1024×1024</span></div>
  <div id="iconList"></div>
  <div id="iconActions" style="display:none; flex-direction:column; gap:5px;"><button class="btn-primary" id="applyIconToScreenBtn" style="font-size:10px; height:28px;">↳ Bake Homescreen to Screen</button><button id="clearIconSelBtn" style="width:100%; height:24px; font-size:9.5px;">Deselect</button></div>
  <div class="sep"></div>
  <span class="lbl">Export</span>
  <div class="size-row"><input type="number" id="exportW" value="2048" min="256" /><span class="x-sep">×</span><input type="number" id="exportH" value="2048" min="256" /></div>
  <div class="seg"><button id="p1k">1K</button><button id="p2k">2K</button><button id="p4k">4K</button></div>
  <button class="btn-primary" id="exportBtn">Export PNG</button>
</div>
<button id="hsToggleBtn" title="Toggle Homescreen Preview"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="14" height="16" rx="2"/><rect x="5.5" y="5" width="4" height="4" rx="1"/><rect x="10.5" y="5" width="4" height="4" rx="1"/><rect x="5.5" y="11" width="4" height="4" rx="1"/><rect x="10.5" y="11" width="4" height="4" rx="1"/></svg>Homescreen</button>
<div id="hsPanel"><div id="hsPanelHeader"><span>Homescreen Preview</span><button id="hsPanelClose">✕</button></div><div id="hsPanelBody"><div class="iphone-homescreen"><div class="hs-time" id="hsTime">9:41</div><div class="hs-grid" id="hsGrid"></div><div class="hs-dock" id="hsDock"></div></div></div></div>
<button id="orbitBtn" title="Orbit everywhere (disables panel)">⊕</button><div id="toasts"></div><div class="hint">Drag · Scroll · Right-drag pan</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.165.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.165.0/examples/jsm/"}}</script>
<script type="module" src="./viewer-2.js"></script>
</body>
</html>
