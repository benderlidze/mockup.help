<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mockup Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    #0d0d10;
      --panel: #111116;
      --line:  rgba(255,255,255,.07);
      --t0:    rgba(255,255,255,.85);
      --t1:    rgba(255,255,255,.48);
      --t2:    rgba(255,255,255,.2);
      --hi:    rgba(255,255,255,.07);
      --hi2:   rgba(255,255,255,.12);
      --r:     5px;
      --f:     'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); overflow: hidden; }

    #canvas {
      display: block;
      width: 100%; height: 100%;
      /* ensure the canvas itself always catches pointer events */
      touch-action: none;
    }

    /* ── Panel ── */
    #panel {
      position: absolute; top: 14px; left: 14px; z-index: 20;
      width: 240px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      font-family: var(--f);
      /* panel must NOT intercept pointer events that land on the canvas */
      pointer-events: auto;
    }

    .hdr { display: flex; align-items: center; justify-content: space-between; }
    .hdr-title { font-size: 11.5px; color: var(--t0); letter-spacing: -.01em; }
    #status { font-size: 10px; color: var(--t2); transition: color .3s; }
    #status.ok  { color: rgba(80,210,130,.75); }
    #status.err { color: rgba(210,90,90,.75); }

    .sep { height: 1px; background: var(--line); }

    .lbl {
      font-size: 9.5px; color: var(--t2);
      letter-spacing: .08em; text-transform: uppercase;
    }

    /* segmented control */
    .seg { display: flex; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
    .seg button {
      flex: 1; height: 28px; background: none; border: none;
      border-right: 1px solid var(--line);
      color: var(--t2); font: 10.5px var(--f); cursor: pointer;
      transition: background .1s, color .1s;
    }
    .seg button:last-child { border-right: none; }
    .seg button:hover { background: var(--hi); color: var(--t1); }
    .seg button.on  { background: var(--hi2); color: var(--t0); }

    /* drop zone */
    .dz {
      position: relative; height: 42px;
      border: 1px dashed var(--line); border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      font-size: 10.5px; color: var(--t2); cursor: pointer;
      transition: all .15s;
      overflow: hidden;
    }
    .dz:hover, .dz.over {
      border-color: rgba(255,255,255,.22);
      color: var(--t1); background: var(--hi);
    }
    .dz input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; height: 100%;
    }

    #bgColorWrap { display: none; }
    #bgColorPick {
      width: 100%; height: 30px;
      border: 1px solid var(--line); border-radius: var(--r);
      background: var(--hi); padding: 3px; cursor: pointer;
    }

    /* generic button */
    button {
      font: 10.5px var(--f); cursor: pointer; border-radius: var(--r);
      border: 1px solid var(--line); background: var(--hi); color: var(--t1);
      transition: background .1s, color .1s;
    }
    button:hover { background: var(--hi2); color: var(--t0); }

    .row2 { display: flex; gap: 6px; }
    .row2 > button { flex: 1; height: 30px; }
    .ghost { background: none; }
    .ghost:hover { background: var(--hi); }

    .btn-primary {
      width: 100%; height: 34px;
      background: rgba(255,255,255,.88); color: #0d0d10;
      border-color: transparent; font-size: 11.5px;
    }
    .btn-primary:hover { background: #fff; color: #000; }

    /* size row */
    .size-row { display: flex; align-items: center; gap: 4px; }
    .size-row input {
      flex: 1; height: 28px;
      background: var(--hi); border: 1px solid var(--line);
      border-radius: var(--r); color: var(--t0);
      font: 11px var(--f); text-align: center; outline: none;
      -moz-appearance: textfield;
    }
    .size-row input::-webkit-inner-spin-button,
    .size-row input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .size-row input:focus { border-color: rgba(255,255,255,.18); }
    .x-sep { font-size: 10px; color: var(--t2); flex-shrink: 0; }
    .btn-xs { height: 28px; padding: 0 7px; font-size: 9.5px; flex-shrink: 0; }

    /* toasts */
    #toasts {
      position: fixed; bottom: 14px; right: 14px; z-index: 100;
      display: flex; flex-direction: column-reverse; gap: 4px;
      pointer-events: none;
    }
    .toast {
      padding: 7px 11px; border-radius: 6px;
      background: rgba(11,11,15,.97); border: 1px solid var(--line);
      font: 10.5px var(--f); color: var(--t1);
      backdrop-filter: blur(12px);
      animation: tin .18s ease; transition: opacity .25s;
    }
    .toast.ok  { border-color: rgba(80,200,130,.2);  color: rgba(90,210,140,.9); }
    .toast.err { border-color: rgba(210,80,80,.2);   color: rgba(210,110,110,.9); }
    @keyframes tin {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }

    .hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      font: 10px var(--f); color: var(--t2); pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="panel">

  <div class="hdr">
    <span class="hdr-title">3D Mockup Studio</span>
    <span id="status">Loading…</span>
  </div>

  <div class="sep"></div>

  <!-- Background -->
  <span class="lbl">Background</span>
  <div class="seg">
    <button class="on" id="bgTransBtn">Transparent</button>
    <button id="bgSolidBtn">Color</button>
  </div>
  <div id="bgColorWrap">
    <input type="color" id="bgColorPick" value="#0b0b0f" />
  </div>

  <div class="sep"></div>

  <!-- Screen -->
  <span class="lbl">Screen</span>
  <div class="dz" id="screenDZ">
    <input type="file" id="screenInput" accept="image/png,image/jpeg,image/webp" />
    <span>↓ Drop image &nbsp;·&nbsp; PNG / JPG / WebP</span>
  </div>
  <div class="seg" id="fitSeg">
    <button class="on" data-v="cover">Cover</button>
    <button data-v="contain">Contain</button>
    <button data-v="stretch">Stretch</button>
  </div>
  <div class="seg" id="rotSeg">
    <button class="on" data-v="0">0°</button>
    <button data-v="90">90°</button>
    <button data-v="180">180°</button>
    <button data-v="270">270°</button>
  </div>
  <div class="row2">
    <button id="applyBtn">Apply</button>
    <button id="clearBtn" class="ghost">Clear</button>
  </div>

  <div class="sep"></div>

  <!-- Export -->
  <span class="lbl">Export</span>
  <div class="size-row">
    <input type="number" id="exportW" value="2048" min="256" />
    <span class="x-sep">×</span>
    <input type="number" id="exportH" value="2048" min="256" />
    <button class="btn-xs" id="p1k">1K</button>
    <button class="btn-xs" id="p2k">2K</button>
    <button class="btn-xs" id="p4k">4K</button>
  </div>
  <button class="btn-primary" id="exportBtn">Export PNG</button>

</div>

<div id="toasts"></div>
<div class="hint">Drag · Scroll · Right-drag pan</div>

<script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.165.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.165.0/examples/jsm/"}}
</script>
<script type="module" src="./viewer.js"></script>
</body>
</html>
